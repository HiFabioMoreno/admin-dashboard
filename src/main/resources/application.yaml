spring:
  application:
    name: Portfolio
  datasource:
    url: jdbc:postgresql://localhost:${DATABASE_PORT}}/${DATABASE_NAME}
    name: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    database: POSTGRESQL