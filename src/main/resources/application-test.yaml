spring:
  user:
    name: test
  datasource:
    url: jdbc:h2:mem:${DATABASE_TEST_NAME}
    username: ${DATABASE_TEST_USER}
    password: ${DATABASE_TEST_PASSWORD}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
